<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="description" content="趣味についてのアンケート">
    <title>趣味についてのアンケート</title>
</head>

<body>
    <form action="/submit" method="post" name="form">
    <div>
        <span>名前:</span>
        <input type="text" placeholder="名前">
    </div>

    <div>
        <span>メールアドレス:</span>
        <input type="email"placeholder="メールアドレス">
    </div>


    <div>
        <span>性別:</span>
        <input type="radio" name="gender" value="1"> 男性
        <input type="radio" name="gender" value="2"> 女性
    </div>

    
    <div>
        <span>趣味:</span>
        <input type="checkbox" name="hobby" value="1"> 読書
        <input type="checkbox" name="hobby" value="2"> スポーツ
        <input type="checkbox" name="hobby" value="3"> 音楽
    </div>

    <div>
        <span>国:</span>
        <select name="country">
            <option value="1"> 日本</option>
            <option value="2"> アメリカ</option>
            <option value="3"> イギリス</option>
        </select> 
    </div>

    <div>
        <p>コメント:</p>
        <textarea rows="4" cols="50"></textarea>
    </div>

    <div>
        <input type="submit" value="送信"> 
    </div>
</form>

</body>
</html>
