<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="description" content="テックカンファレンス2023">
    <title>テックカンファレンス2023</title>
</head>

<body>
    <header>
        <h1>テックカンファレンス2023</h1>
    </header>

    <nav>
        <ul>
            <li><a href="#home">ホーム</a></li>
            <li><a href="#speaker">スピーカー</a></li>
            <li><a href="#registration">登録</a></li>
        </ul>
    </nav>

    <main>
        <article>
            <h2>イベント概要</h2>
            <p>このカンファレンスでは最新の技術トレンドを紹介します。</p>
        </article>
        <aside>参加者にはオリジナルのノベルティが用意されています。</aside>

        <table border="1">
            <tr>
                <th>セッション</th>
                <th>スピーカー</th>
                <th>時間</th>
            </tr>

            <tr>
                <td rowspan="2">基調講演</td>
                <td>Dr.Tech</td>
                <td>10:00~11:00</td>
            </tr>
                
            <tr>
                <td>Dr.Mac</td>
                <td>11:30~12:30</td>
            </tr>

            <tr>
                <td>パネルディスカッション</td>
                <td>Dr.Tech</td>
                <td>13:30~14:30</td>
            </tr>
        </table>

        <form action="/submit" method="post" name="formel">
            <div>
                <span>名前:</span>
                <input type="text" placeholder="name">
            </div>

            <div>
                <span>メールアドレス:</span>
                <input type="email" placeholder="mail">
            </div>

            <div>
                <span>性別：</span>
                <input type="radio" name="gender" value="1">男性
                <input type="radio" name="gender" value="2">女性
            </div>

            <div>
                <span>興味のある分野:</span>
                <input type="checkbox" name="field" value="1">技術
                <input type="checkbox" name="field" value="2">芸術
                <input type="checkbox" name="field" value="3">科学
            </div>

            <div>
                <span>国:</span>
                <select name="country">
                    <option value="1">日本</option>
                    <option value="2">アメリカ</option>
                    <option value="3">イギリス</option>
                </select>
            </div>

            <div>
                <p>コメント:</p>
                <textarea rows="4" cols="53" placeholder="comment"></textarea>
            </div>

            <div>
                <input type="submit" method="post" value="送信">
            </div>
        </form>
    </main>

    <footer>©2023 テックカンファレンス.All rights reserved.</footer>

</body>
</html>
